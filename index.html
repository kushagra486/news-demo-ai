<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>BharatNews.ai — Daily Intelligence</title>
<meta name="description" content="Bharat News AI — Live AI-powered daily news intelligence">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/kushagra486/bharat-news-ai/main/logo.png">
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kushagra486/bharat-news-ai/main/logo.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════════════════════════════════════════════════
   DESIGN TOKENS — Instagram layout patterns, purple/pink/blue brand gradient
   ════════════════════════════════════════════════════ */
:root{
  --bg:#fafafa; --surface:#ffffff; --surface2:#f5f5f7; --surface3:#efeff1;
  --border:#e5e5e7; --border2:#dbdbdb; --text:#0a0a0a; --text2:#555; --text3:#8e8e8e;
  --accent:#e91e8c; --accent2:#9333ea; --accent3:#3b82f6;
  --grad:linear-gradient(135deg,#e91e8c,#9333ea,#3b82f6);
  --grad-soft:linear-gradient(135deg,rgba(233,30,140,.12),rgba(147,51,234,.12),rgba(59,130,246,.12));
  --danger:#ed4956; --success:#10b981; --warn:#f59e0b;
  --radius:14px; --radius-sm:8px; --radius-lg:20px;
  --tab-h:56px; --topbar-h:54px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04); --shadow-md:0 4px 16px rgba(0,0,0,.08); --shadow-lg:0 12px 32px rgba(0,0,0,.14);
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#000000; --surface:#0e0e0e; --surface2:#161616; --surface3:#1f1f1f;
  --border:#262626; --border2:#363636; --text:#f5f5f5; --text2:#a8a8a8; --text3:#737373;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow-md:0 4px 16px rgba(0,0,0,.4); --shadow-lg:0 12px 32px rgba(0,0,0,.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;
  font-size:14.5px;line-height:1.45;overflow-x:hidden;
  transition:background .25s,color .25s;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;color:inherit;}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
:focus-visible{outline:2px solid var(--accent2);outline-offset:2px;border-radius:4px;}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important;}}

.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-sm);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes heartBurst{0%{transform:scale(0);opacity:0}25%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:0}}

/* ════════════════════════════════════════════════════
   APP SHELL — mobile-first single column (IG ratio), desktop adds rail
   ════════════════════════════════════════════════════ */
.app{max-width:680px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg);}
@media(min-width:980px){.app{max-width:935px;}}

/* ── TOP BAR (Instagram-style: logo left, icons right) ── */
.topbar{
  position:sticky;top:0;z-index:60;height:var(--topbar-h);
  padding-top:var(--safe-top);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:16px;padding-right:8px;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.topbar-logo{display:flex;align-items:center;gap:8px;cursor:pointer;}
.topbar-logo img{height:30px;width:auto;object-fit:contain;}
.topbar-logo .fallback-text{font-size:19px;font-weight:800;}
.topbar-actions{display:flex;align-items:center;gap:2px;}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;transition:background .15s,transform .1s;position:relative;}
.icon-btn:active{transform:scale(.88);background:var(--surface2);}
.icon-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:1.5px solid var(--surface);}

/* ── STORIES ROW ── */
.stories-row{display:flex;gap:14px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface);}
.stories-row::-webkit-scrollbar{display:none;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;width:64px;cursor:pointer;background:none;}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2.5px;background:var(--grad);display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.story-ring.viewed{background:var(--border2);}
.story-item:active .story-ring{transform:scale(.93);}
.story-ring-inner{width:100%;height:100%;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px;border:2px solid var(--surface);}
.story-ring-inner img{width:100%;height:100%;object-fit:cover;}
.story-label{font-size:11px;color:var(--text2);max-width:64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── SECTOR/FILTER CHIPS ── */
.chip-row{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);}
.chip-row::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--surface2);color:var(--text2);transition:.15s;white-space:nowrap;}
.chip.active{background:var(--text);color:var(--bg);}
[data-theme="dark"] .chip.active{background:var(--grad);color:#fff;}
.chip:active{transform:scale(.95);}

/* ── FEED ── */
.feed{padding-bottom:90px;}
.card{border-bottom:1px solid var(--border);padding:14px 16px 6px;animation:fadeIn .3s;}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.card-avatar{width:34px;height:34px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;}
.card-avatar img{width:100%;height:100%;object-fit:cover;}
.card-source{font-size:13.5px;font-weight:700;}
.card-meta{font-size:11.5px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.badge-breaking{background:var(--danger);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.3px;text-transform:uppercase;}
.badge-sector{background:var(--grad-soft);color:var(--accent2);font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;}
.card-more{margin-left:auto;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.card-img-wrap{width:100%;border-radius:var(--radius);overflow:hidden;background:var(--surface2);margin-bottom:8px;position:relative;aspect-ratio:1/1;}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;}
.card-img-wrap.no-img{display:flex;align-items:center;justify-content:center;font-size:46px;aspect-ratio:16/9;}
.card-title{font-size:15.5px;font-weight:700;line-height:1.35;margin-bottom:6px;cursor:pointer;}
.card-summary{font-size:13.5px;color:var(--text2);line-height:1.5;margin-bottom:10px;}
.card-actions{display:flex;align-items:center;gap:4px;padding:6px 0 10px;}
.action-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);transition:.12s;}
.action-btn:active{transform:scale(.92);background:var(--surface2);}
.action-btn.liked{color:var(--danger);}
.action-btn.saved{color:var(--accent2);}
.action-spacer{margin-left:auto;}
.reading-time{font-size:11.5px;color:var(--text3);padding:2px 0 8px;}

/* ── DOUBLE TAP HEART BURST ── */
.heart-burst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:90px;pointer-events:none;animation:heartBurst .8s ease-out forwards;filter:drop-shadow(0 4px 14px rgba(0,0,0,.3));z-index:5;}

/* ── BOTTOM TAB BAR (Instagram pattern) ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:70;height:var(--tab-h);
  padding-bottom:var(--safe-bot);
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  max-width:680px;margin:0 auto;
}
.tab-btn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:21px;color:var(--text);position:relative;}
.tab-btn.active{color:var(--accent2);}
.tab-btn .tlabel{font-size:9.5px;font-weight:600;color:var(--text3);}
.tab-btn.active .tlabel{color:var(--accent2);}
.tab-btn:active{transform:scale(.9);}
.tab-fab{width:30px;height:30px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;}

/* ── LOGIN PAGE (Instagram-pattern auth screen) ── */
.lp{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;overflow-y:auto;}
.lp.hidden{display:none;}
.lp-box{width:100%;max-width:360px;}
.lp-logo{display:flex;justify-content:center;margin-bottom:18px;}
.lp-logo img{height:64px;width:auto;object-fit:contain;}
.lp-tag{text-align:center;font-size:13.5px;color:var(--text2);margin-bottom:28px;font-weight:500;}
.lp-field{margin-bottom:12px;}
.lp-input-wrap{position:relative;}
.lp-input{width:100%;padding:13px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);font-size:14px;color:var(--text);transition:border-color .15s;}
.lp-input:focus{border-color:var(--accent2);background:var(--surface);}
.lp-pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--text2);}
.lp-btn{width:100%;padding:13px;border-radius:var(--radius-sm);background:var(--grad);color:#fff;font-weight:700;font-size:14.5px;margin-top:6px;transition:opacity .15s,transform .1s;}
.lp-btn:active{transform:scale(.98);}
.lp-btn:disabled{opacity:.55;cursor:not-allowed;}
.lp-btn.lp-ghost{background:none;border:1px solid var(--border2);color:var(--text);}
.lp-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text3);font-size:12px;font-weight:600;}
.lp-divider::before,.lp-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.lp-err{color:var(--danger);font-size:12.5px;margin:6px 0;min-height:16px;}
.lp-foot{text-align:center;font-size:13px;color:var(--text2);margin-top:22px;}
.lp-link{color:var(--accent2);font-weight:700;}
.lp-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px;}
.lp-tab{flex:1;padding:10px;text-align:center;font-size:13.5px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;}
.lp-tab.active{color:var(--text);border-color:var(--text);}
.lp-panel{display:none;}
.lp-panel.active{display:block;animation:fadeIn .25s;}
.lp-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}

/* ── CHAT (slide-up sheet, IG DM pattern) ── */
.chat-sheet{position:fixed;inset:0;z-index:150;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);}
.chat-sheet.open{transform:translateY(0);}
.chat-head{display:flex;align-items:center;gap:12px;padding:calc(var(--safe-top) + 10px) 14px 12px;border-bottom:1px solid var(--border);background:var(--surface);}
.chat-head-title{font-weight:800;font-size:15.5px;flex:1;}
.chat-mode-tabs{display:flex;gap:6px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.chat-mode-btn{flex:1;padding:7px;border-radius:8px;font-size:12.5px;font-weight:700;background:var(--surface2);color:var(--text2);}
.chat-mode-btn.active{background:var(--grad);color:#fff;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.45;animation:fadeIn .2s;}
.chat-bubble.user{align-self:flex-end;background:var(--grad);color:#fff;border-bottom-right-radius:4px;}
.chat-bubble.bot{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:4px;}
.chat-typing{display:flex;gap:4px;padding:10px 14px;background:var(--surface2);border-radius:16px;align-self:flex-start;width:fit-content;}
.chat-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typingDot 1.2s infinite;}
.chat-dot:nth-child(2){animation-delay:.2s}.chat-dot:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding-top:4px;}
.chat-sugg-chip{padding:6px 12px;border:1px solid var(--border2);border-radius:14px;font-size:12px;font-weight:600;color:var(--text2);}
.chat-input-bar{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;padding-bottom:calc(var(--safe-bot) + 10px);border-top:1px solid var(--border);background:var(--surface);}
.chat-input{flex:1;border:1px solid var(--border2);border-radius:20px;padding:10px 16px;background:var(--surface2);font-size:14px;resize:none;max-height:100px;color:var(--text);}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:opacity .15s,transform .1s;}
.chat-send:disabled{opacity:.4;}
.chat-send:active{transform:scale(.9);}
.chat-news-card{border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:4px;cursor:pointer;}
.chat-news-card .t{font-size:12.5px;font-weight:700;margin-bottom:2px;}
.chat-news-card .s{font-size:11px;color:var(--text3);}

/* ── ARTICLE READER (full sheet) ── */
.reader-sheet{position:fixed;inset:0;z-index:140;background:var(--bg);overflow-y:auto;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);}
.reader-sheet.open{transform:translateX(0);}
.reader-top{position:sticky;top:0;display:flex;align-items:center;gap:10px;padding:calc(var(--safe-top) + 10px) 14px 10px;background:var(--surface);border-bottom:1px solid var(--border);z-index:5;}
.reader-img{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--surface2);}
.reader-body{padding:18px 18px 60px;}
.reader-title{font-size:21px;font-weight:800;line-height:1.3;margin-bottom:10px;}
.reader-meta{font-size:12.5px;color:var(--text3);margin-bottom:18px;}
.reader-summary{font-size:14.5px;line-height:1.7;color:var(--text2);margin-bottom:18px;}
.reader-ai-box{background:var(--grad-soft);border-radius:var(--radius);padding:14px;margin-bottom:18px;}
.reader-ai-box .h{font-size:12.5px;font-weight:800;color:var(--accent2);margin-bottom:6px;display:flex;align-items:center;gap:6px;}

/* ── STORY VIEWER (full screen) ── */
.story-viewer{position:fixed;inset:0;z-index:300;background:#000;display:none;flex-direction:column;}
.story-viewer.open{display:flex;}
.story-prog-row{display:flex;gap:4px;padding:calc(var(--safe-top) + 8px) 10px 8px;}
.story-prog-bar{flex:1;height:2.5px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;}
.story-prog-fill{height:100%;width:0%;background:#fff;}
.story-prog-fill.done{width:100%;}
.story-head{display:flex;align-items:center;gap:10px;padding:0 14px 10px;color:#fff;}
.story-head .av{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
.story-head .nm{font-weight:700;font-size:13.5px;}
.story-head .tm{font-size:11.5px;opacity:.75;}
.story-body{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.story-body img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.story-overlay-grad{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(transparent,rgba(0,0,0,.85));}
.story-text{position:absolute;bottom:90px;left:18px;right:18px;color:#fff;font-size:17px;font-weight:700;line-height:1.35;text-shadow:0 2px 8px rgba(0,0,0,.5);}
.story-tap-zone{position:absolute;top:0;bottom:0;width:35%;z-index:2;}
.story-cta{position:absolute;bottom:24px;left:18px;right:18px;background:#fff;color:#000;text-align:center;padding:12px;border-radius:10px;font-weight:700;font-size:14px;z-index:3;}

/* ── PROFILE / SIDE SHEETS ── */
.sheet{position:fixed;inset:0;z-index:130;background:rgba(0,0,0,.5);display:none;align-items:flex-end;}
.sheet.open{display:flex;animation:fadeIn .2s;}
.sheet-content{width:100%;max-height:88vh;background:var(--surface);border-radius:20px 20px 0 0;overflow-y:auto;animation:slideUp .28s cubic-bezier(.32,.72,0,1);padding-bottom:calc(var(--safe-bot) + 16px);}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto;}
.sheet-head{display:flex;align-items:center;padding:4px 18px 14px;}
.sheet-title{font-size:16px;font-weight:800;flex:1;}
.sheet-body{padding:0 18px 18px;}
.profile-avatar-lg{width:84px;height:84px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;margin:0 auto 12px;}
.profile-stat-row{display:flex;justify-content:center;gap:32px;margin:14px 0 18px;}
.profile-stat{text-align:center;}
.profile-stat .n{font-size:17px;font-weight:800;}
.profile-stat .l{font-size:11.5px;color:var(--text3);}
.setting-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.setting-row .ic{font-size:19px;width:26px;text-align:center;}
.setting-row .lab{flex:1;font-size:14px;font-weight:600;}
.toggle{width:44px;height:26px;border-radius:13px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--grad);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.toggle.on::after{transform:translateX(18px);}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 14px);left:0;right:0;z-index:400;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.toast{background:var(--text);color:var(--bg);padding:11px 20px;border-radius:24px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);animation:fadeIn .2s;max-width:90%;}

/* ── EXPLORE GRID ── */
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;}
.explore-item{aspect-ratio:1/1;background:var(--surface2);position:relative;overflow:hidden;cursor:pointer;}
.explore-item img{width:100%;height:100%;object-fit:cover;}
.explore-item .ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.55));display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:11px;font-weight:700;line-height:1.3;}

/* ── SCORES / STOCKS ── */
.section-pad{padding:16px;}
.score-card{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.score-teams{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.score-team{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;}
.score-status{font-size:11px;font-weight:700;color:var(--success);text-align:center;padding:4px 0;}
.stock-card{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.stock-name{font-weight:700;font-size:14px;}
.stock-change{font-weight:700;font-size:13.5px;}
.stock-change.up{color:var(--success);}
.stock-change.down{color:var(--danger);}

/* ── EMPTY STATES ── */
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 30px;color:var(--text3);}
.empty-state .ic{font-size:48px;margin-bottom:14px;opacity:.6;}
.empty-state .t{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.empty-state .s{font-size:13px;}

/* ── LOADER ── */
.loader-spin{width:24px;height:24px;border:3px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;}
.center-loader{display:flex;justify-content:center;padding:40px;}

/* ── SEARCH OVERLAY ── */
.search-overlay{position:fixed;inset:0;z-index:160;background:var(--bg);display:none;flex-direction:column;}
.search-overlay.open{display:flex;}
.search-bar-row{display:flex;align-items:center;gap:10px;padding:calc(var(--safe-top) + 10px) 14px 10px;border-bottom:1px solid var(--border);}
.search-input{flex:1;background:var(--surface2);border:none;border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);}
.search-cancel{font-size:14px;font-weight:600;color:var(--accent2);flex-shrink:0;}

/* ── SCREEN VISIBILITY ── */
.view{display:none;}
.view.active{display:block;}

/* ── DESKTOP ENHANCEMENTS ── */
@media(min-width:768px){
  body{font-size:15px;}
  .card-title{font-size:16.5px;}
}
@media(max-width:380px){
  .stories-row{padding:12px 10px;gap:11px;}
  .story-item{width:58px;}
  .story-ring{width:54px;height:54px;}
}

/* ── CLOCK + WEATHER PILL (topbar) ── */
.info-pill-row{display:flex;gap:8px;padding:8px 16px 0;background:var(--surface);overflow-x:auto;scrollbar-width:none}
.info-pill-row::-webkit-scrollbar{display:none}
.info-pill{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  padding:5px 11px;border-radius:20px;background:var(--surface2);
  font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;
  transition:background .15s;
}
.info-pill:active{background:var(--surface3)}
.info-pill .ip-val{color:var(--text);font-weight:700}

/* ── LIVE SCORE CARDS (real match data) ── */
.live-score-card{
  background:var(--surface2);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;border:1px solid var(--border);
}
.live-score-head{
  display:flex;align-items:center;justify-content:between;gap:8px;
  margin-bottom:10px;font-size:11px;color:var(--text3);font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;
}
.live-score-head .live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--danger);
  animation:pulse-dot 1.5s infinite;margin-right:4px;
}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.live-score-teams{display:flex;align-items:center;justify-content:space-between;gap:10px}
.live-score-team{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.live-score-team-name{font-size:13px;font-weight:700;color:var(--text);text-align:center}
.live-score-team-score{font-size:18px;font-weight:800;color:var(--accent2)}
.live-score-vs{font-size:11px;color:var(--text3);font-weight:700;padding:0 6px}
.live-score-status{
  text-align:center;font-size:11.5px;color:var(--text2);
  margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
}
.score-sport-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.score-sport-tabs::-webkit-scrollbar{display:none}

/* ── DAILY BRIEFING CARD ── */
.briefing-card{
  background:var(--grad-soft);border:1px solid rgba(147,51,234,.18);
  border-radius:var(--radius-lg);padding:16px;margin:12px 16px;
  cursor:pointer;
}
.briefing-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.briefing-badge{
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  background:var(--grad);color:#fff;padding:3px 9px;border-radius:20px;
}
.briefing-title{font-size:13px;font-weight:700;color:var(--text)}
.briefing-text{font-size:13px;color:var(--text2);line-height:1.6}
.briefing-text strong{color:var(--accent2)}

/* ── QUIZ CARD ── */
.quiz-card{
  background:var(--surface2);border-radius:var(--radius);
  padding:18px;margin-bottom:12px;
}
.quiz-q{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;line-height:1.4}
.quiz-opt{
  display:block;width:100%;text-align:left;padding:12px 14px;
  border-radius:12px;border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text);font-size:13.5px;
  margin-bottom:8px;cursor:pointer;transition:all .15s;
}
.quiz-opt:hover{border-color:var(--accent2)}
.quiz-opt.correct{background:rgba(16,185,129,.12);border-color:var(--success);color:var(--success)}
.quiz-opt.wrong{background:rgba(237,73,86,.12);border-color:var(--danger);color:var(--danger)}
.quiz-score-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface2);border-radius:20px;padding:6px 14px;
  font-size:12px;font-weight:700;color:var(--text2);margin-bottom:14px;
}

/* ── TIME CAPSULE ── */
.capsule-card{
  background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(147,51,234,.08));

  });
}
function articleId(a){
  return (a.url || a.title || '').slice(0, 120);
}
function timeAgo(dateStr){
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  var diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff/60) + 'm';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  return Math.floor(diff/86400) + 'd';
}
function readingTime(text){
  var words = (text||'').split(/\s+/).filter(Boolean).length;
  var mins = Math.max(1, Math.round(words / 200));
  return mins + ' min read';
}
function fmtP(n){
  if (n == null || isNaN(n)) return '—';
  var sign = n >= 0 ? '+' : '';
  return sign + n.toFixed(2) + '%';
}
async function fetchWithTimeout(url, opts, ms){
  ms = ms || 8000;
  var controller = new AbortController();
  var id = setTimeout(function(){ controller.abort(); }, ms);
  try{
    var res = await fetch(url, Object.assign({}, opts||{}, { signal: controller.signal }));
    clearTimeout(id);
    return res;
  }catch(e){
    clearTimeout(id);
    throw e;
  }
}

// ══════════════════════════════════════════════════
// MERGE & DEDUPE
// ══════════════════════════════════════════════════
function mergeSources(arrays){
  var combined = [];
  arrays.forEach(function(arr){ if (Array.isArray(arr)) combined = combined.concat(arr); });
  var seen = {};
  var deduped = combined.filter(function(a){
    if (!a || !a.title) return false;
    var key = a.title.slice(0, 50).toLowerCase().replace(/[^a-z0-9]/g, '');
    if (!key || seen[key]) return false;
    seen[key] = true;
    return true;
  });
  deduped.sort(function(a, b){
    var ta = a.publishedAt ? new Date(a.publishedAt).getTime() : 0;
    var tb = b.publishedAt ? new Date(b.publishedAt).getTime() : 0;
    return tb - ta;
  });
  return deduped;
}

  ];
  return topics.map(function(t, i){
    return {

      url: '#',

      source: 'BharatNews.ai',

async function fetchAllSectors(sector){
  sector = sector || 'All';
  showFeedLoader(true);
  try{
    var results = await Promise.allSettled([
      fetchFromGNews(sector),
      fetchFromNewsData(sector),
      fetchFromGuardian(sector),
      fetchFromNewsAPI(sector),
      fetchFromWorldNews(sector),
      fetchFromCurrents(sector)
    ]);
    var arrays = results.map(function(r){ return r.status === 'fulfilled' ? r.value : []; });
    var merged = mergeSources(arrays);
    if (merged.length === 0) merged = getFallbackNews();
    _allArticles = merged;
    renderFeed();
    updateStoriesFromNews();
    checkAlerts(merged);
  }catch(e){
    console.error('fetchAllSectors error:', e);
    _allArticles = getFallbackNews();
    renderFeed();
  }finally{
    showFeedLoader(false);
  }
}
function showFeedLoader(show){
  var el = document.getElementById('feedContainer');
  if (!el) return;
  if (show && _allArticles.length === 0){

    for (var i=0;i<3;i++){

}

function renderCard(a, idx, listName){
  listName = listName || 'feed';
  var id = a._id || articleId(a);
  var liked = _likes.indexOf(id) > -1;
  var saved = _bookmarks.some(function(b){ return (b._id || articleId(b)) === id; });
  var isRead = _readIds.indexOf(id) > -1;
  var breaking = isBreaking(a);
  var initials = (a.source || '?').slice(0,2).toUpperCase();
  var openCall = "openReaderFrom('" + listName + "'," + idx + ")";

  var imgHtml = a.image
    ? '<div class="card-img-wrap" onclick="' + openCall + '"><img src="' + escapeHtml(a.image) + '" loading="lazy" alt="" onerror="this.parentElement.outerHTML=\'<div class=&quot;card-img-wrap no-img&quot;>' + (a._emoji||'📰') + '</div>\'"></div>'
    : '<div class="card-img-wrap no-img" onclick="' + openCall + '">' + (a._emoji||'📰') + '</div>';

  return '' +
  '<div class="card" data-idx="' + idx + '" ondblclick="cardDoubleTap(\'' + listName + '\',' + idx + ', event)">' +
    '<div class="card-head">' +
      '<div class="card-avatar">' + initials + '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div class="card-source">' + escapeHtml(a.source) + '</div>' +
        '<div class="card-meta">' +
          (breaking ? '<span class="badge-breaking">LIVE</span>' : '') +
          '<span>' + timeAgo(a.publishedAt) + '</span>' +
          '<span class="badge-sector">' + escapeHtml(a.sector || 'All') + '</span>' +
        '</div>' +
      '</div>' +
      '<button class="card-more" onclick="shareAsImage(\'' + listName + '\',' + idx + ')">⋯</button>' +
    '</div>' +
    imgHtml +
    '<div style="padding-top:2px">' +
      '<div class="card-title" onclick="' + openCall + '" style="' + (isRead ? 'color:var(--text3)' : '') + '">' + escapeHtml(a.title) + '</div>' +
      '<div class="card-summary">' + escapeHtml((a.summary||'').slice(0,140)) + ((a.summary||'').length>140?'…':'') + '</div>' +
      '<div class="card-actions">' +
        '<button class="action-btn' + (liked?' liked':'') + '" onclick="toggleLike(\'' + listName + '\',' + idx + ')">' + (liked?'❤️':'🤍') + ' Like</button>' +
        '<button class="action-btn" onclick="openChat();prefillChatAbout(\'' + listName + '\',' + idx + ')">💬 Discuss</button>' +
        '<button class="action-btn' + (saved?' saved':'') + ' action-spacer" onclick="toggleBookmark(\'' + listName + '\',' + idx + ')">' + (saved?'🔖':'📑') + ' Save</button>' +
      '</div>' +
      '<div class="reading-time">' + readingTime(a.content||a.summary) + '</div>' +
    '</div>' +
  '</div>';
}
function getListArray(listName){
  if (listName === 'india') return _indiaArticles;
  if (listName === 'bookmarks') return _bookmarks;
  if (listName === 'search') return _searchResultsArr;
  return _allArticles;
}
function isBreaking(a){
  if (!a.publishedAt) return false;
  var diff = Date.now() - new Date(a.publishedAt).getTime();
  return diff > 0 && diff < 1000*60*60;
}
function renderFeed(){
  var el = document.getElementById('feedContainer');
  if (!el) return;
  if (_allArticles.length === 0){
    el.innerHTML = '<div class="empty-state"><div class="ic">📭</div><div class="t">No articles yet</div><div class="s">Pull to refresh or check your connection.</div></div>';
    return;
  }
  el.innerHTML = _allArticles.map(function(a, i){ return renderCard(a, i); }).join('');
}
function cardDoubleTap(listName, idx, ev){
  var arr = getListArray(listName);
  var a = arr[idx];
  if (!a) return;
  var id = a._id || articleId(a);
  if (_likes.indexOf(id) === -1){
    toggleLike(listName, idx);
  }
  var card = ev.currentTarget;
  var burst = document.createElement('div');
  burst.className = 'heart-burst';
  burst.textContent = '❤️';
  card.style.position = 'relative';
  card.appendChild(burst);
  setTimeout(function(){ burst.remove(); }, 800);
}
function toggleLike(listName, idx){
  var arr = getListArray(listName);
  var a = arr[idx];
  if (!a) return;
  var id = a._id || articleId(a);
  var i = _likes.indexOf(id);
  if (i > -1) _likes.splice(i, 1); else _likes.push(id);
  persistLikes();
  rerenderList(listName);
}
function toggleBookmark(listName, idx){
  var arr = getListArray(listName);
  var a = arr[idx];
  if (!a) return;
  var id = a._id || articleId(a);
  var i = _bookmarks.findIndex(function(b){ return (b._id || articleId(b)) === id; });
  if (i > -1){ _bookmarks.splice(i, 1); showToast('Removed from Saved'); }
  else { _bookmarks.push(a); showToast('Saved'); }
  persistBookmarks();
  rerenderList(listName);
  if (listName !== 'bookmarks' && _currentView === 'bookmarks') renderBookmarksView();
}
function rerenderList(listName){
  if (listName === 'india') loadIndiaView();
  else if (listName === 'bookmarks') renderBookmarksView();
  else if (listName === 'search') renderSearchResults();
  else renderFeed();
}
function markRead(a){
  var id = a._id || articleId(a);
  if (_readIds.indexOf(id) === -1){ _readIds.push(id); persistRead(); }
}

// GROQ AI
// ══════════════════════════════════════════════════
async function callAI(messages, opts){
  opts = opts || {};
  try{
    var res = await fetchWithTimeout(GROQ_BASE, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROQ_KEY
      },
      body: JSON.stringify({
        model: opts.model || 'llama-3.1-8b-instant',
        messages: messages,
        temperature: opts.temperature != null ? opts.temperature : 0.6,
        max_tokens: opts.max_tokens || 500
      })
    }, 15000);
    if (!res.ok){
      var errBody = await res.text().catch(function(){ return ''; });
      var err = new Error('Groq API error ' + res.status + ': ' + errBody.slice(0,200));
      err.status = res.status;
      throw err;
    }
    var data = await res.json();
    var text = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    if (!text) throw new Error('Empty AI response');
    return text.trim();
  }catch(e){
    console.error('callAI failed:', e.message);
    throw e;
  }
}

// ══════════════════════════════════════════════════
// CHATBOT SYSTEM
// ⚠️ Note: every function below that uses `await` is declared `async`.
// A missing `async` here is a hard SyntaxError that breaks the ENTIRE
// script on page load — that was the root cause of the freeze in the
// previous build. Keep this invariant when editing.
// ══════════════════════════════════════════════════
function openChat(){
  document.getElementById('chatSheet').classList.add('open');

}

}
function setChatMode(mode){

  document.getElementById('cm-general').classList.toggle('active', mode === 'general');
}
function initChatWelcome(){

      '<div class="chat-suggestions">' +
        '<button class="chat-sugg-chip" onclick="quickAsk(\'What are today\\\'s top headlines?\')">Top headlines</button>' +
        '<button class="chat-sugg-chip" onclick="quickAsk(\'Summarize the market news\')">Market summary</button>' +
        '<button class="chat-sugg-chip" onclick="quickAsk(\'Any breaking news right now?\')">Breaking news</button>' +
      '</div>' +
    '</div>';
}
function quickAsk(q){
  var inp = document.getElementById('chatInput');
  if (inp){ inp.value = q; }
  sendChatMsg();
}
function appendUserMsg(text){
  var msgs = document.getElementById('chatMessages');
  var d = document.createElement('div');
  d.className = 'chat-bubble user';
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function appendBotMsg(text, isTyping, newsCards){
  var msgs = document.getElementById('chatMessages');
  var d = document.createElement('div');
  d.className = 'chat-bubble bot';
  d.textContent = text;
  if (newsCards && newsCards.length){
    var wrap = document.createElement('div');
    newsCards.forEach(function(c){
      var card = document.createElement('div');
      card.className = 'chat-news-card';
      card.innerHTML = '<div class="t">' + escapeHtml(c.title) + '</div><div class="s">' + escapeHtml(c.source) + '</div>';
      card.onclick = function(){ openReaderWithArticle(c); };
      wrap.appendChild(card);
    });
    d.appendChild(wrap);
  }
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}
function appendTypingIndicator(){
  var msgs = document.getElementById('chatMessages');
  var d = document.createElement('div');
  d.className = 'chat-typing';
  d.innerHTML = '<div class="chat-dot"></div><div class="chat-dot"></div><div class="chat-dot"></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}
function prefillChatAbout(listName, idx){
  var arr = getListArray(listName);
  var a = arr[idx];
  if (!a) return;
  setTimeout(function(){
    var inp = document.getElementById('chatInput');
    if (inp) inp.value = 'Tell me more about: ' + a.title;
  }, 150);
}

function friendlyAIErrorMessage(e){
  var status = e && e.status;
  if (status === 401) return '⚠️ The AI key was rejected (401 Unauthorized). It may have been revoked or expired — check the Groq dashboard.';
  if (status === 429) return '⚠️ The AI is rate-limited right now (429 Too Many Requests). Please wait a moment and try again.';
  if (status === 404) return '⚠️ The AI model is no longer available (404). It may need to be updated to a current model name.';
  if (status >= 500) return '⚠️ The AI service is temporarily unavailable (' + status + '). Please try again shortly.';
  if (e && e.name === 'AbortError') return '⚠️ The AI took too long to respond and timed out. Please try again.';
  return 'Sorry, I ran into an error reaching the AI. Please try again.';
}
async function sendChatMsg(){
  var inp = document.getElementById('chatInput');
  var q = (inp && inp.value || '').trim();
  if (!q || _chatTyping) return;
  inp.value = '';
  inp.style.height = 'auto';

  var msgs = document.getElementById('chatMessages');
  var sug = msgs && msgs.querySelector('.chat-suggestions');
  if (sug) sug.remove();

  appendUserMsg(q);
  _chatHistory.push({ role: 'user', content: q });

  _chatTyping = true;
  var sendBtn = document.getElementById('chatSendBtn');
  if (sendBtn) sendBtn.disabled = true;

  var typingEl = appendTypingIndicator();

  try{
    var response;
    if (_chatMode === 'news'){
      response = await handleNewsChat(q);
    } else {
      response = await handleGeneralChat(q);
    }
    if (typingEl) typingEl.remove();
    if (response){
      var botText = typeof response === 'string' ? response : response.text;
      var newsCards = typeof response === 'object' ? response.cards : null;
      appendBotMsg(botText, false, newsCards);
      _chatHistory.push({ role: 'assistant', content: botText });
      if (_chatHistory.length > 20) _chatHistory = _chatHistory.slice(-20);
    }
  }catch(e){
    if (typingEl) typingEl.remove();
    appendBotMsg(friendlyAIErrorMessage(e), false);
    console.error('Chat error:', e);
  }finally{
    // Always release the lock, even if something above throws unexpectedly —
    // this guarantees the chat never gets stuck "typing" forever.
    _chatTyping = false;
    if (sendBtn) sendBtn.disabled = false;
    if (inp) inp.focus();
  }
}

async function handleNewsChat(q){
  var newsCards = [];
  try{
    var searchResults = await Promise.allSettled([ searchNewsAPI(q), searchGNews(q) ]);
    searchResults.forEach(function(r){
      if (r.status === 'fulfilled' && r.value) newsCards = newsCards.concat(r.value);
    });
  }catch(e){ /* fall through with empty cards */ }

  var seen = {};
  newsCards = newsCards.filter(function(c){
    var k = (c.title||'').slice(0,40).toLowerCase();
    if (!k || seen[k]) return false;
    seen[k] = true;
    return true;
  }).slice(0, 4);

  var context = newsCards.length
    ? 'Relevant live articles found:\n' + newsCards.map(function(c,i){ return (i+1) + '. ' + c.title + ' (' + c.source + ')'; }).join('\n')
    : 'No live articles were found for this query; answer from general knowledge and say so if relevant.';

  var answer = await callAI([
    {role:'system', content:'You are a helpful news assistant for an Indian news app. Be concise (under 100 words) and conversational. Reference the live articles when relevant.'},
    {role:'user', content: context + '\n\nUser question: ' + q}
  ]);
  return { text: answer, cards: newsCards };
}

async function handleGeneralChat(q){
  var convo = _chatHistory.slice(-8);
  var messages = [{role:'system', content:'You are a friendly, helpful general-purpose assistant inside a news app. Be concise and conversational.'}].concat(convo);
  var answer = await callAI(messages);
  return answer;
}

var _storyViewedIds = JSON.parse(localStorage.getItem('bn_story_viewed')||'[]');
function updateStoriesFromNews(){

function renderStories(){
  var row = document.getElementById('storiesRow');
  if (!row) return;
  if (_storiesData.length === 0){
    row.innerHTML = '';
    return;
  }
  row.innerHTML = _storiesData.map(function(a, i){
    var id = a._id || articleId(a);
    var viewed = _storyViewedIds.indexOf(id) > -1;
    var initials = (a.source||'?').slice(0,2).toUpperCase();
    var inner = a.image
      ? '<img src="' + escapeHtml(a.image) + '" alt="" onerror="this.parentElement.textContent=\'' + (a._emoji||'📰') + '\'">'
      : (a._emoji || initials);
    return '<button class="story-item" onclick="openStory(' + i + ')">' +
      '<div class="story-ring' + (viewed?' viewed':'') + '"><div class="story-ring-inner">' + inner + '</div></div>' +
      '<div class="story-label">' + escapeHtml(a.source) + '</div>' +
    '</button>';
  }).join('');
}
function openStory(i){
  _storyIndex = i;
  document.getElementById('storyViewer').classList.add('open');
  renderStoryProgress();
  showStory(i);
}
function closeStory(){
  document.getElementById('storyViewer').classList.remove('open');
  clearStoryTimer();
}
function renderStoryProgress(){
  var row = document.getElementById('storyProgRow');
  row.innerHTML = _storiesData.map(function(){ return '<div class="story-prog-bar"><div class="story-prog-fill"></div></div>'; }).join('');
}
function clearStoryTimer(){
  if (_storyTimer){ clearInterval(_storyTimer); _storyTimer = null; }
}
function showStory(i){
  if (i < 0){ closeStory(); return; }
  if (i >= _storiesData.length){ closeStory(); return; }
  _storyIndex = i;
  var a = _storiesData[i];
  var id = a._id || articleId(a);
  if (_storyViewedIds.indexOf(id) === -1){
    _storyViewedIds.push(id);
    localStorage.setItem('bn_story_viewed', JSON.stringify(_storyViewedIds));
  }
  document.getElementById('storyName').textContent = a.source;
  document.getElementById('storyTime').textContent = timeAgo(a.publishedAt);
  document.getElementById('storyAvatar').textContent = (a.source||'?').slice(0,2).toUpperCase();
  document.getElementById('storyText').textContent = a.title;

  var body = document.getElementById('storyBody');
  var existingImg = body.querySelector('img');
  if (existingImg) existingImg.remove();
  if (a.image){
    var img = document.createElement('img');
    img.src = a.image;
    img.alt = '';
    img.onerror = function(){ this.remove(); };
    body.insertBefore(img, body.firstChild);
  }

  var bars = document.querySelectorAll('.story-prog-bar .story-prog-fill');
  bars.forEach(function(b, idx){
    b.classList.remove('done');
    b.style.width = idx < i ? '100%' : '0%';
    b.style.transition = 'none';
  });

  clearStoryTimer();
  var fill = bars[i];
  if (fill){
    var raf = window.requestAnimationFrame || function(cb){ return setTimeout(cb, 16); };
    raf(function(){
      fill.style.transition = 'width 6s linear';
      fill.style.width = '100%';
    });
  }
  _storyTimer = setTimeout(function(){ nextStory(); }, 6000);
}
function nextStory(){ clearStoryTimer(); showStory(_storyIndex + 1); }
function prevStory(){ clearStoryTimer(); showStory(_storyIndex - 1); }
function openFromStory(){
  var a = _storiesData[_storyIndex];
  if (!a) return;
  closeStory();
  openReaderWithArticle(a);
}
document.addEventListener('keydown', function(e){
  var viewer = document.getElementById('storyViewer');
  if (!viewer || !viewer.classList.contains('open')) return;
  if (e.key === 'ArrowRight') nextStory();
  else if (e.key === 'ArrowLeft') prevStory();
  else if (e.key === 'Escape') closeStory();
});

// AUTH — login / signup / OTP / guest / session restore
// ⚠️ Same invariant as the chatbot: every function with `await` must be
// `async`, and every button must be re-enabled in a `finally` block so a
// network failure can never leave the login screen stuck.
// ══════════════════════════════════════════════════
function lpTab(which){
  document.querySelectorAll('.lp-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.lp-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('lt-' + which).classList.add('active');
  document.getElementById('lp-' + which).classList.add('active');
  var foot = document.getElementById('lpFoot');
  if (which === 'in'){
    document.getElementById('lpFootText').textContent = "Don't have an account?";
    document.getElementById('lpFootLink').textContent = 'Sign up';
    document.getElementById('lpFootLink').onclick = function(){ lpTab('up'); };
    foot.style.display = '';
  } else if (which === 'up') {
    document.getElementById('lpFootText').textContent = 'Already have an account?';
    document.getElementById('lpFootLink').textContent = 'Sign in';
    document.getElementById('lpFootLink').onclick = function(){ lpTab('in'); };
    foot.style.display = '';
  } else {
    foot.style.display = 'none';
  }
}
function togglePassVis(id, btn){
  var inp = document.getElementById(id);
  if (!inp) return;
  var isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.textContent = isPass ? 'HIDE' : 'SHOW';
}
function setBtnLoading(btn, loading, label){
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="lp-spinner"></span>' + label : label;
}

async function supaLogin(){
  var email = (document.getElementById('lpInEmail').value || '').trim();
  var pass = document.getElementById('lpInPass').value || '';
  var errEl = document.getElementById('lpInErr');
  var btn = document.getElementById('lpInBtn');
  errEl.textContent = '';

  if (!email || !pass){ errEl.textContent = 'Please enter email and password.'; return; }

  setBtnLoading(btn, true, 'Logging in...');
  try{
    await waitForSupabaseSDK();
    var sb = getSupabase();
    if (!sb) throw new Error('Auth service unavailable. Check your connection and refresh.');
    var result = await sb.auth.signInWithPassword({ email: email, password: pass });
    if (result.error) throw result.error;
    onSupaAuthSuccess(result.data.user);
  }catch(e){
    errEl.textContent = (e && e.message) || 'Login failed. Please check your credentials.';
  }finally{
    setBtnLoading(btn, false, 'Log In');
  }
}

async function supaSignup(){
  var name = (document.getElementById('lpUpName').value || '').trim();
  var prof = (document.getElementById('lpUpProf').value || '').trim();
  var email = (document.getElementById('lpUpEmail').value || '').trim();
  var pass = document.getElementById('lpUpPass').value || '';
  var errEl = document.getElementById('lpUpErr');
  var btn = document.getElementById('lpUpBtn');
  errEl.textContent = '';

  if (!name || !email || !pass){ errEl.textContent = 'Please fill in all fields.'; return; }
  if (pass.length < 6){ errEl.textContent = 'Password must be at least 6 characters.'; return; }

  setBtnLoading(btn, true, 'Signing up...');
  try{
    await waitForSupabaseSDK();
    var sb = getSupabase();
    if (!sb) throw new Error('Auth service unavailable. Check your connection and refresh.');
    var result = await sb.auth.signUp({
      email: email, password: pass,
      options: {
        data: { full_name: name, profession: prof },
        emailRedirectTo: window.location.origin + window.location.pathname
      }
    });
    if (result.error) throw result.error;
    if (result.data && result.data.session){
      onSupaAuthSuccess(result.data.user);
    } else {
      document.getElementById('lpOtpMsg').textContent = 'Enter the 6-digit code we emailed to ' + email + '.';
      window._pendingOtpEmail = email;
      lpTab('otp');
    }
  }catch(e){
    errEl.textContent = (e && e.message) || 'Sign up failed. Please try again.';
  }finally{
    setBtnLoading(btn, false, 'Sign Up');
  }
}

async function supaVerifyOTP(){
  var code = (document.getElementById('lpOtpCode').value || '').trim();
  var errEl = document.getElementById('lpOtpErr');
  var btn = document.getElementById('lpOtpBtn');
  errEl.textContent = '';

  if (!code || code.length < 6){ errEl.textContent = 'Enter the 6-digit code.'; return; }
  if (!window._pendingOtpEmail){ errEl.textContent = 'Session expired. Please sign up again.'; return; }

  setBtnLoading(btn, true, 'Verifying...');
  try{
    var sb = getSupabase();
    if (!sb) throw new Error('Auth service unavailable.');
    var result = await sb.auth.verifyOtp({ email: window._pendingOtpEmail, token: code, type: 'signup' });
    if (result.error) throw result.error;
    onSupaAuthSuccess(result.data.user);
  }catch(e){
    errEl.textContent = (e && e.message) || 'Verification failed. Please check the code.';
  }finally{
    setBtnLoading(btn, false, 'Verify & Enter');
  }
}

async function supaForgot(email){
  try{
    var sb = getSupabase();
    if (!sb) throw new Error('Auth service unavailable.');

async function restoreSupabaseSession(){
  try{
    await waitForSupabaseSDK();
    var sb = getSupabase();

    var result = await sb.auth.getSession();
    if (result.data && result.data.session && result.data.session.user){

  }catch(e){
    console.warn('Session restore failed:', e.message);
    return false;
  }
}

function startClock() {
  function tick() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h % 12 || 12;
    var el = document.getElementById('clockVal');
    if (el) el.textContent = h12 + ':' + (m<10?'0':'') + m + ' ' + ampm;
  }
  tick();
  setInterval(tick, 15000);
}

// WEATHER (Open-Meteo + Nominatim, no key needed)
// ══════════════════════════════════════════════════
var _weatherCache = null;
async function fetchWeather(forceRefresh) {
  var el = document.getElementById('weatherVal');
  try {
    var cached = JSON.parse(localStorage.getItem('bna_wx') || 'null');
    var now = Date.now();
    if (!forceRefresh && cached && (now - cached.ts) < 30*60*1000) {
      if (el) el.textContent = cached.temp + '°C ' + cached.city;
      return;
    }
    if (el) el.textContent = '...';
    var pos = await new Promise(function(resolve) {
      if (!navigator.geolocation) { resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        function(p){ resolve(p.coords); },
        function(){ resolve(null); },
        { timeout: 5000 }
      );
    });
    var lat = pos ? pos.latitude  : 28.6139;  // fallback: Delhi
    var lon = pos ? pos.longitude : 77.2090;

    var ac = new AbortController(); setTimeout(function(){ac.abort();}, 8000);
    var r = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current_weather=true', {signal: ac.signal});
    var d = await r.json();
    var temp = Math.round(d.current_weather.temperature);

    var city = 'Local';
    try {
      var rg = await fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json', {signal: ac.signal, headers:{'Accept-Language':'en'}});
      var gd = await rg.json();
      city = (gd.address && (gd.address.city || gd.address.town || gd.address.state)) || 'Local';
    } catch(e) {}

    if (el) el.textContent = temp + '°C ' + city;
    localStorage.setItem('bna_wx', JSON.stringify({temp:temp, city:city, ts:now}));
  } catch(e) {
    if (el) el.textContent = '--°C';
  }
}

var _scoresSport = 'cricket';

async function loadScoresLive(sport) {
  _scoresSport = sport || _scoresSport;
  var el = document.getElementById('scoresContainer');
  if (!el) return;
  el.innerHTML = '<div class="score-sport-tabs">'
    + ['cricket','football'].map(function(s) {
        var active = s === _scoresSport ? 'active' : '';
        var label = s === 'cricket' ? '🏏 Cricket' : '⚽ Football';
        return '<button class="chip '+active+'" onclick="loadScoresLive(\''+s+'\')">'+label+'</button>';
      }).join('')
    + '</div><div class="center-loader"><div class="loader-spin"></div></div>';

  try {
    var matches = [];
    if (_scoresSport === 'cricket') {
      matches = await fetchCricketScores();
    } else {
      matches = await fetchFootballScores();
    }
    renderLiveScores(matches);
  } catch(e) {
    renderLiveScores([]);
  }
}

async function fetchCricketScores() {
  try {
    var ac = new AbortController(); setTimeout(function(){ac.abort();}, 8000);
    var r = await fetch(CRICAPI_BASE+'/currentMatches?apikey='+CRICAPI_KEY+'&offset=0', {signal: ac.signal});
    var d = await r.json();
    if (!d.data) return [];
    return d.data.slice(0,8).map(function(m) {
      var t1 = m.teams && m.teams[0] || 'Team A';
      var t2 = m.teams && m.teams[1] || 'Team B';
      var s1 = '', s2 = '';
      if (m.score && m.score.length) {
        m.score.forEach(function(sc) {
          if (sc.inning && sc.inning.indexOf(t1) === 0) s1 = sc.r+'/'+sc.w+' ('+sc.o+')';
          else if (sc.inning && sc.inning.indexOf(t2) === 0) s2 = sc.r+'/'+sc.w+' ('+sc.o+')';
        });
      }
      return {
        sport: 'cricket', team1: t1, team2: t2,
        score1: s1, score2: s2,
        status: m.status || 'Scheduled',
        isLive: m.matchStarted && !m.matchEnded
      };
    });
  } catch(e) { return []; }
}

async function fetchFootballScores() {
  try {
    var ac = new AbortController(); setTimeout(function(){ac.abort();}, 8000);
    // ISL via TheSportsDB
    var r = await fetch(SPORTSDB_BASE+'/eventsday.php?d='+new Date().toISOString().slice(0,10)+'&s=Soccer', {signal: ac.signal});
    var d = await r.json();
    if (!d.events) return [];
    return d.events.slice(0,8).map(function(ev) {
      return {
        sport: 'football',
        team1: ev.strHomeTeam, team2: ev.strAwayTeam,
        score1: ev.intHomeScore || '-', score2: ev.intAwayScore || '-',
        status: ev.strStatus || ev.strTime || 'Scheduled',
        isLive: ev.strStatus === 'Live' || ev.strStatus === '1H' || ev.strStatus === '2H'
      };
    });
  } catch(e) { return []; }
}

function renderLiveScores(matches) {
  var el = document.getElementById('scoresContainer');
  if (!el) return;
  var tabsHtml = '<div class="score-sport-tabs">'
    + ['cricket','football'].map(function(s) {
        var active = s === _scoresSport ? 'active' : '';
        var label = s === 'cricket' ? '🏏 Cricket' : '⚽ Football';
        return '<button class="chip '+active+'" onclick="loadScoresLive(\''+s+'\')">'+label+'</button>';
      }).join('')
    + '</div>';

  if (!matches || !matches.length) {
    el.innerHTML = tabsHtml + '<div class="empty-state"><div class="ic">🏆</div><div class="t">No live matches right now</div><div class="s">Check back during match hours.</div></div>';
    return;
  }

  el.innerHTML = tabsHtml + matches.map(function(m) {
    var liveTag = m.isLive ? '<span class="live-dot"></span>LIVE' : 'SCHEDULED';
    return '<div class="live-score-card">'

        + '<div class="live-score-team"><div class="live-score-team-name">' + escapeHtml(m.team1) + '</div><div class="live-score-team-score">' + escapeHtml(m.score1||'-') + '</div></div>'
        + '<div class="live-score-vs">VS</div>'
        + '<div class="live-score-team"><div class="live-score-team-name">' + escapeHtml(m.team2) + '</div><div class="live-score-team-score">' + escapeHtml(m.score2||'-') + '</div></div>'
      + '</div>'
      + '<div class="live-score-status">' + escapeHtml(m.status||'') + '</div>'
    + '</div>';
  }).join('');
}

// QUIZ — AI generated, one question at a time
// ══════════════════════════════════════════════════
var _quizScore = 0, _quizTotal = 0, _quizCurrent = null;

async function loadQuizView() {
  _quizScore = 0; _quizTotal = 0;
  await nextQuizQuestion();
}

async function nextQuizQuestion() {
  var el = document.getElementById('quizContainer');
  if (!el) return;
  el.innerHTML = '<div class="quiz-score-pill">Score: ' + _quizScore + '/' + _quizTotal + '</div><div class="center-loader"><div class="loader-spin"></div></div>';
  try {
    var prompt = 'Generate ONE multiple choice quiz question about Indian current affairs, history, sports, or general knowledge. '
      + 'Respond ONLY in this exact JSON format with no markdown, no backticks: '
      + '{"question":"...","options":["A","B","C","D"],"correctIndex":0,"explanation":"..."}';
    var raw = await callAI(prompt, 'You are a quiz generator. Respond with ONLY valid JSON, nothing else.');
    var clean = (raw||'').replace(/```json|```/g,'').trim();
    var q = JSON.parse(clean);
    _quizCurrent = q;
    renderQuizQuestion(q);
  } catch(e) {
    el.innerHTML = '<div class="empty-state"><div class="ic">🏆</div><div class="t">Could not load quiz</div><button class="chip" onclick="nextQuizQuestion()" style="margin-top:10px">Try Again</button></div>';
  }
}

function renderQuizQuestion(q) {
  var el = document.getElementById('quizContainer');
  if (!el) return;
  el.innerHTML = '<div class="quiz-score-pill">Score: ' + _quizScore + '/' + _quizTotal + '</div>'
    + '<div class="quiz-card">'
      + '<div class="quiz-q">' + escapeHtml(q.question) + '</div>'
      + q.options.map(function(opt, i) {
          return '<button class="quiz-opt" onclick="answerQuiz('+i+')" id="qopt-'+i+'">' + escapeHtml(opt) + '</button>';
        }).join('')
    + '</div>';
}

function answerQuiz(selectedIndex) {
  var q = _quizCurrent;
  if (!q) return;
  _quizTotal++;
  var correct = selectedIndex === q.correctIndex;
  if (correct) _quizScore++;

  document.querySelectorAll('.quiz-opt').forEach(function(btn, i) {
    btn.style.pointerEvents = 'none';
    if (i === q.correctIndex) btn.classList.add('correct');
    else if (i === selectedIndex) btn.classList.add('wrong');
  });

  setTimeout(function() {
    var el = document.getElementById('quizContainer');
    if (el) {
      var explainDiv = document.createElement('div');
      explainDiv.style.cssText = 'padding:12px 14px;background:var(--surface3);border-radius:12px;font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5';
      explainDiv.innerHTML = (correct ? '✅ Correct! ' : '❌ ') + escapeHtml(q.explanation||'');
      el.appendChild(explainDiv);
      var nextBtn = document.createElement('button');
      nextBtn.className = 'lp-btn';
      nextBtn.style.marginTop = '12px';
      nextBtn.textContent = 'Next Question →';
      nextBtn.onclick = nextQuizQuestion;
      el.appendChild(nextBtn);
    }
  }, 300);
}

// ══════════════════════════════════════════════════
// TIME CAPSULE — "On this day" style AI-generated
// ══════════════════════════════════════════════════
async function loadCapsuleView() {
  var el = document.getElementById('capsuleContainer');
  if (!el) return;
  el.innerHTML = '<div class="center-loader"><div class="loader-spin"></div></div>';
  try {
    var today = new Date();
    var dateStr = today.toLocaleDateString('en-IN', {month:'long', day:'numeric'});
    var prompt = 'List 3 significant historical events that happened on ' + dateStr + ' (any year), relevant to India or world history. '
      + 'For each: give the year, a short headline, and a 1-sentence summary. '
      + 'Format as: **Year** — Headline\\nSummary\\n\\n (repeat for each, separated by blank line)';
    var answer = await callAI(prompt, 'You are a history expert. Be accurate and concise.');
    var formatted = (answer || 'Could not load historical events.')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    var entries = formatted.split('\n\n').filter(function(e){ return e.trim(); });
    el.innerHTML = '<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.5px;margin-bottom:14px">🕰️ On This Day — ' + dateStr + '</div>'
      + entries.map(function(entry) {
          var lines = entry.split('\n');
          return '<div class="capsule-card">'
            + '<div class="capsule-headline">' + (lines[0]||'') + '</div>'
            + '<div class="capsule-summary">' + (lines.slice(1).join(' ')||'') + '</div>'
          + '</div>';
        }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty-state"><div class="ic">🕰️</div><div class="t">Could not load time capsule</div></div>';
  }
}


if (document.readyState === 'loading'){
  
document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
