name: 📱 Build BharatNews.ai APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore bharatnews.keystore \
            -alias bharatnews \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass bharatnews123 \
            -keypass bharatnews123 \
            -dname "CN=BharatNewsAI, OU=Dev, O=BharatNews, L=Mumbai, ST=MH, C=IN" \
            -noprompt

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Create TWA manifest
        run: |
          mkdir -p twa
          cat > twa/twa-manifest.json << 'JSON'
          {
            "packageId": "com.bharatnewsai.app",
            "host": "kushagra486.github.io",
            "name": "BharatNews.ai",
            "launcherName": "BharatNews",
            "display": "standalone",
            "themeColor": "#0a0a0a",
            "navigationColor": "#0a0a0a",
            "navigationColorDark": "#0a0a0a",
            "navigationDividerColor": "#0a0a0a",
            "navigationDividerColorDark": "#0a0a0a",
            "backgroundColor": "#0a0a0a",
            "enableNotifications": false,
            "startUrl": "/news-demo-ai/",
            "iconUrl": "https://raw.githubusercontent.com/kushagra486/bharat-news-ai/main/logo.png",
            "maskableIconUrl": "https://raw.githubusercontent.com/kushagra486/bharat-news-ai/main/logo.png",
            "monochromeIconUrl": "https://raw.githubusercontent.com/kushagra486/bharat-news-ai/main/logo.png",
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://kushagra486.github.io/news-demo-ai/manifest.json",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://kushagra486.github.io/news-demo-ai/",
            "minSdkVersion": 21,
            "orientation": "default",
            "fingerprints": [],
            "signingKey": {
              "path": "../bharatnews.keystore",
              "alias": "bharatnews"
            },
            "signingKeyPassphrase": "bharatnews123",
            "storeKeyPassphrase": "bharatnews123",
            "retainedBundles": []
          }
          JSON

      - name: Build TWA APK
        working-directory: twa
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --manifest twa-manifest.json
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: bharatnews123
          BUBBLEWRAP_KEY_PASSWORD: bharatnews123

      - name: Locate APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null
          find . -name "*.aab" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BharatNewsAI-v${{ github.run_number }}
          path: |
            **/*.apk
            **/*.aab
          if-no-files-found: warn
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BharatNews.ai APK v1.0.${{ github.run_number }}"
          body: |
            ## 📱 BharatNews.ai — Android APK

            ### Install on Android
            1. Download `app-release-signed.apk` below
            2. Open it on your Android phone
            3. If prompted: **Settings → Security → Install unknown apps → Allow**
            4. Tap **Install** ✅

            > Built from: https://kushagra486.github.io/news-demo-ai/
          files: "**/*.apk"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
