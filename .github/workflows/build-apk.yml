name: 📱 Build BharatNews.ai APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore bharatnews.keystore \
            -alias bharatnews \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass bharatnews123 -keypass bharatnews123 \
            -dname "CN=BharatNewsAI,O=BharatNews,C=IN" \
            -noprompt

      - name: Create Android TWA project
        run: |
          mkdir -p twa/app/src/main/java/com/bharatnewsai/app
          mkdir -p twa/app/src/main/res/{values,xml}
          for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p twa/app/src/main/res/mipmap-$d
          done

      - name: Download app icon
        run: |
          curl -sL "https://raw.githubusercontent.com/kushagra486/bharat-news-ai/main/logo.png" -o /tmp/logo.png
          for d in twa/app/src/main/res/mipmap-*; do
            cp /tmp/logo.png "$d/ic_launcher.png"
            cp /tmp/logo.png "$d/ic_launcher_round.png"
          done

      - name: Write build files
        run: |
          # settings.gradle
          echo "include ':app'" > twa/settings.gradle

          # gradle.properties
          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # root build.gradle
          cat > twa/build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # app/build.gradle
          cat > twa/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
            compileSdk 34
            namespace 'com.bharatnewsai.app'
            defaultConfig {
              applicationId 'com.bharatnewsai.app'
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName '1.0.0'
            }
            signingConfigs {
              release {
                storeFile file('../../bharatnews.keystore')
                storePassword 'bharatnews123'
                keyAlias 'bharatnews'
                keyPassword 'bharatnews123'
              }
            }
            buildTypes {
              release {
                minifyEnabled false
                signingConfig signingConfigs.release
              }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          dependencies {
            implementation 'androidx.browser:browser:1.8.0'
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest.xml
          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
              android:label="BharatNews.ai"
              android:icon="@mipmap/ic_launcher"
              android:roundIcon="@mipmap/ic_launcher_round"
              android:theme="@android:style/Theme.Black.NoTitleBar">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://kushagra486.github.io/news-demo-ai/"/>
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                  android:resource="@color/colorPrimary"/>
                <meta-data android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                  android:resource="@color/colorPrimary"/>
                <meta-data android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                  android:resource="@mipmap/ic_launcher"/>
                <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                  android:resource="@color/colorPrimary"/>
                <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION"
                  android:value="300"/>
                <meta-data android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY"
                  android:value="com.bharatnewsai.app.fileprovider"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https"
                    android:host="kushagra486.github.io"
                    android:pathPrefix="/news-demo-ai"/>
                </intent-filter>
              </activity>
              <provider
                android:name="androidx.core.content.FileProvider"
                android:authorities="com.bharatnewsai.app.fileprovider"
                android:exported="false"
                android:grantUriPermissions="true">
                <meta-data android:name="android.support.FILE_PROVIDER_PATHS"
                  android:resource="@xml/filepaths"/>
              </provider>
            </application>
          </manifest>
          EOF

          # res/values/colors.xml
          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#0a0a0a</color>
          </resources>
          EOF

          # res/values/strings.xml
          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">BharatNews.ai</string>
          </resources>
          EOF

          # res/xml/filepaths.xml
          cat > twa/app/src/main/res/xml/filepaths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths><external-path name="external_files" path="."/></paths>
          EOF

      - name: Setup Gradle wrapper
        working-directory: twa
        run: gradle wrapper --gradle-version 8.4

      - name: Build APK
        working-directory: twa
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Copy & name APK
        run: |
          APK=$(find twa -name "*.apk" | grep release | head -1)
          echo "Found: $APK"
          cp "$APK" "BharatNewsAI-v1.0.${{ github.run_number }}.apk"

      - name: Upload as artifact (90-day download link)
        uses: actions/upload-artifact@v4
        with:
          name: BharatNewsAI-APK-v1.0.${{ github.run_number }}
          path: "BharatNewsAI-*.apk"
          retention-days: 90

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.${{ github.run_number }}
          name: "📱 BharatNews.ai APK v1.0.${{ github.run_number }}"
          body: |
            ## 📱 BharatNews.ai — Android App

            **Tap the APK below to download and install on Android.**

            ### Install steps:
            1. Download `BharatNewsAI-v1.0.${{ github.run_number }}.apk`
            2. On your phone: **Settings → Security → Install unknown apps → Allow**
            3. Open the APK file → tap **Install**
            4. Launch **BharatNews.ai** from your home screen ✅

            > App loads: https://kushagra486.github.io/news-demo-ai/
          files: "BharatNewsAI-*.apk"
          draft: false
